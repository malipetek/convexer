services:
  traefik:
    image: traefik:latest
    container_name: convexer-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - convexer-net
    command:
      - "--providers.docker=true"
      - "--providers.docker.network=convexer-net"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--accesslog=true"
      - "--log.level=DEBUG"

  convexer:
    build: .
    container_name: convexer
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - convexer-data:/app/server/data
      - convexer-ssh:/root/.ssh
      - convexer-backups:/app/server/data/backups
    environment:
      - DATA_DIR=/app/server/data
      - DOMAIN=${DOMAIN:-malipetek.online}
      - TUNNEL_DOMAIN=${TUNNEL_DOMAIN:-}
      - TUNNEL_CONFIG_PATH=${TUNNEL_CONFIG_PATH:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - GITHUB_REPO=${GITHUB_REPO:-malipetek/convexer}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    labels:
      - traefik.enable=true
      - traefik.http.routers.convexer.rule=Host(`malipetek.online`)
      - traefik.http.routers.convexer.entrypoints=web
      - traefik.http.services.convexer.loadbalancer.server.port=4000
    networks:
      - convexer-net

volumes:
  convexer-data:
  convexer-ssh:
  convexer-backups:

networks:
  convexer-net:
    name: convexer-net
    driver: bridge
    external: true
