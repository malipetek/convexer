services:
  better-auth-sidecar:
    build:
      context: .
      target: betterauth-runtime
    image: convexer-better-auth-sidecar:latest
    restart: "no"
    entrypoint: ["echo", "better-auth-sidecar image ready"]

  traefik:
    image: traefik:latest
    container_name: convexer-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - convexer-net
    command:
      - "--providers.docker=true"
      - "--providers.docker.network=convexer-net"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--accesslog=true"
      - "--log.level=DEBUG"

  convexer:
    build: .
    container_name: convexer
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - convexer-data:/app/server/data
      - convexer-ssh:/root/.ssh
      - convexer-backups:/app/server/data/backups
      - ${HOST_PROJECT_PATH:-/home/convexer}/server/data:/app/host-data:ro
    environment:
      - DATA_DIR=/app/server/data
      - DOMAIN=${DOMAIN}
      - TUNNEL_DOMAIN=${TUNNEL_DOMAIN:-}
      - TUNNEL_CONFIG_PATH=${TUNNEL_CONFIG_PATH:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - GITHUB_REPO=${GITHUB_REPO:-malipetek/convexer}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Absolute path of the repo on the HOST machine. The in-app updater
      # bind-mounts this into an ephemeral container to run git pull +
      # docker compose build/up. If unset, the update endpoint is disabled.
      - HOST_PROJECT_PATH=${HOST_PROJECT_PATH:-/home/convexer}
      - UPDATE_BRANCH=${UPDATE_BRANCH:-main}
      - UPDATE_STRATEGY=${UPDATE_STRATEGY:-image}
      - CONVEXER_IMAGE=${CONVEXER_IMAGE:-convexer-convexer}
      - BETTERAUTH_IMAGE=${BETTERAUTH_IMAGE:-convexer-better-auth-sidecar}
    labels:
      - traefik.enable=true
      - traefik.http.routers.convexer.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.convexer.entrypoints=web
      - traefik.http.routers.convexer-secure.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.convexer-secure.entrypoints=websecure
      - traefik.http.routers.convexer-secure.tls=true
      - traefik.http.routers.convexer-secure.service=convexer
      - traefik.http.services.convexer.loadbalancer.server.port=4000
    networks:
      - convexer-net

  # ── Monitoring: Umami (analytics) ──────────────────────────────────────────
  umami-db:
    image: postgres:16-alpine
    container_name: convexer-umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-change_me_umami_db}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    networks:
      - convexer-net

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: convexer-umami
    restart: unless-stopped
    depends_on:
      - umami-db
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-change_me_umami_db}@umami-db:5432/umami
      APP_SECRET: ${UMAMI_APP_SECRET:-change_me_umami_secret_32chars_min}
    labels:
      - traefik.enable=true
      - traefik.http.routers.umami.rule=Host(`umami.${DOMAIN}`)
      - traefik.http.routers.umami.entrypoints=web
      - traefik.http.routers.umami-secure.rule=Host(`umami.${DOMAIN}`)
      - traefik.http.routers.umami-secure.entrypoints=websecure
      - traefik.http.routers.umami-secure.tls=true
      - traefik.http.routers.umami-secure.service=umami
      - traefik.http.services.umami.loadbalancer.server.port=3000
    networks:
      - convexer-net

  # ── Monitoring: GlitchTip (error tracking) ──────────────────────────────────
  glitchtip-db:
    image: postgres:16-alpine
    container_name: convexer-glitchtip-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:-change_me_glitchtip_db}
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    networks:
      - convexer-net

  glitchtip-redis:
    image: redis:7-alpine
    container_name: convexer-glitchtip-redis
    restart: unless-stopped
    networks:
      - convexer-net

  glitchtip-web:
    image: glitchtip/glitchtip
    container_name: convexer-glitchtip-web
    restart: unless-stopped
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    environment:
      DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD:-change_me_glitchtip_db}@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change_me_glitchtip_secret_key}
      REDIS_URL: redis://glitchtip-redis:6379/0
      GLITCHTIP_DOMAIN: https://glitchtip.${DOMAIN}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-errors@example.com}
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      CSRF_TRUSTED_ORIGINS: https://glitchtip.${DOMAIN},http://glitchtip.${DOMAIN}
    labels:
      - traefik.enable=true
      - traefik.http.routers.glitchtip.rule=Host(`glitchtip.${DOMAIN}`)
      - traefik.http.routers.glitchtip.entrypoints=web
      - traefik.http.routers.glitchtip-secure.rule=Host(`glitchtip.${DOMAIN}`)
      - traefik.http.routers.glitchtip-secure.entrypoints=websecure
      - traefik.http.routers.glitchtip-secure.tls=true
      - traefik.http.routers.glitchtip-secure.service=glitchtip
      - traefik.http.services.glitchtip.loadbalancer.server.port=8000
    networks:
      - convexer-net

  glitchtip-worker:
    image: glitchtip/glitchtip
    container_name: convexer-glitchtip-worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    environment:
      DATABASE_URL: postgresql://glitchtip:${GLITCHTIP_DB_PASSWORD:-change_me_glitchtip_db}@glitchtip-db:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change_me_glitchtip_secret_key}
      REDIS_URL: redis://glitchtip-redis:6379/0
      GLITCHTIP_DOMAIN: https://glitchtip.${DOMAIN}
    networks:
      - convexer-net

volumes:
  convexer-data:
    name: convexer-data
  convexer-ssh:
    name: convexer-ssh
  convexer-backups:
    name: convexer-backups
  umami-db-data:
  glitchtip-db-data:

networks:
  convexer-net:
    name: convexer-net
    driver: bridge
    external: true
